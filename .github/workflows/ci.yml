name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # matches Dockerfile's node:20-alpine
          cache: npm

      - run: npm ci

      - name: Lint (frontend + api)
        run: npm run lint:all

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
